<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darbic - Visitor Login</title>
  <link rel="stylesheet" href="visitor.css">

  <style>
    .login-wrapper{
      min-height: calc(100vh - 260px);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .login-card{
      width:100%;
      max-width:500px;
      background:white;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      padding:35px;
    }

    .login-title{
      text-align:center;
      color:#7A1023;
      font-size:32px;
      margin-bottom:10px;
    }

    .login-subtitle{
      text-align:center;
      color:#666;
      margin-bottom:30px;
      font-size:15px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
      margin-bottom:18px;
    }

    .form-group label{
      margin-bottom:8px;
      font-weight:600;
      color:#444;
    }

    .form-group input{
      padding:12px 14px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    .form-group input:focus{
      border-color:#8f0f1f;
      box-shadow:0 0 0 3px rgba(143,15,31,0.10);
    }

    .login-actions{
      margin-top:25px;
      display:flex;
      justify-content:center;
    }

    .login-actions .btn-darbic{
      width:100%;
      justify-content:center;
    }

    .extra-links{
      margin-top:18px;
      text-align:center;
      font-size:14px;
      color:#555;
    }

    .extra-links a{
      color:#7A1023;
      font-weight:600;
      text-decoration:none;
    }

    .extra-links a:hover{
      text-decoration:underline;
    }

    .message-box{
      background:#f9e7ed;
      color:#7A1023;
      border:1px solid #e7c8d0;
      border-radius:10px;
      padding:12px;
      margin-bottom:18px;
      text-align:center;
      font-size:14px;
    }
  </style>
</head>

<body>

  <header class="main-header">
    <img src="images/darbic-logo.jpg" alt="Darbic Logo" class="logo">
    <h1 class="Darbic-name">DARBIC</h1>
   <button class="signout-btn" type="button" onclick="window.location.href='index.html'">Home</button>
  </header>

  <section class="login-wrapper">
    <div class="login-card">

      <h2 class="login-title">Visitor Login</h2>
      <p class="login-subtitle">
        Log in securely to access your visitor dashboard.
      </p>

     

      <form action="#" method="post">

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email address">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password">
        </div>

        <div class="login-actions">
         <button type="button" class="btn-darbic" onclick="window.location.href='visitor.html'">Login</button>
        </div>

        <div class="extra-links">
          Don’t have an account?
          <a href="visitor-signup.html">Sign Up</a>
        </div>

      </form>
    </div>
  </section>

  <footer class="main-footer">
    <div class="footer-content">
      <img src="images/darbic-logo.jpg" alt="Darbic Logo" class="footer-logo">

      <div class="contact-info">
        <p>Email: info@Darbic.com</p>
        <p>Phone: +966 50 000 0000</p>
        <p>Riyadh, Saudi Arabia</p>
      </div>
    </div>

    <div class="footer-bottom">
      &copy; 2026 Darbic. All rights reserved.
    </div>
  </footer>

</body>
</html>
